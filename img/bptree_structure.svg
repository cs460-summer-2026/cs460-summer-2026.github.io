<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="13">

  <!-- background -->
  <rect width="620" height="260" fill="#FAF7F2" rx="6"/>

  <!-- label: Internal node -->
  <text x="310" y="22" text-anchor="middle" font-family="'Manrope', sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#5C2E2A" text-transform="uppercase">INTERNAL NODE (router)</text>

  <!-- root node box -->
  <rect x="200" y="34" width="220" height="38" rx="4" fill="#fff" stroke="#5C2E2A" stroke-width="2"/>
  <!-- dividers inside root -->
  <line x1="273" y1="34" x2="273" y2="72" stroke="#5C2E2A" stroke-width="1.5"/>
  <line x1="347" y1="34" x2="347" y2="72" stroke="#5C2E2A" stroke-width="1.5"/>
  <!-- root keys -->
  <text x="237" y="58" text-anchor="middle" fill="#3D1F1C" font-weight="700">31</text>
  <text x="310" y="58" text-anchor="middle" fill="#3D1F1C" font-weight="700">54</text>
  <text x="383" y="58" text-anchor="middle" fill="#3D1F1C" font-weight="700">78</text>

  <!-- routing labels below root, above connectors -->
  <text x="137" y="102" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">&#60; 31</text>
  <text x="310" y="102" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">31 – 53</text>
  <text x="480" y="102" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">54 – 77</text>
  <text x="590" y="102" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">&#8805; 78</text>

  <!-- connector lines: root to leaves -->
  <line x1="220" y1="72" x2="100" y2="138" stroke="#C4BCB3" stroke-width="1.5"/>
  <line x1="280" y1="72" x2="230" y2="138" stroke="#C4BCB3" stroke-width="1.5"/>
  <line x1="340" y1="72" x2="390" y2="138" stroke="#C4BCB3" stroke-width="1.5"/>
  <line x1="400" y1="72" x2="530" y2="138" stroke="#C4BCB3" stroke-width="1.5"/>

  <!-- label: Leaf nodes -->
  <text x="310" y="132" text-anchor="middle" font-family="'Manrope', sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#2E7D43">LEAF NODES (data)</text>

  <!-- leaf 1: [16 | 24] -->
  <rect x="30" y="142" width="140" height="38" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="100" y1="142" x2="100" y2="180" stroke="#2E7D43" stroke-width="1"/>
  <text x="65" y="166" text-anchor="middle" fill="#1a1a1a">16</text>
  <text x="135" y="166" text-anchor="middle" fill="#1a1a1a">24</text>

  <!-- leaf 2: [31 | 49] -->
  <rect x="185" y="142" width="140" height="38" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="255" y1="142" x2="255" y2="180" stroke="#2E7D43" stroke-width="1"/>
  <text x="220" y="166" text-anchor="middle" fill="#1a1a1a">31</text>
  <text x="290" y="166" text-anchor="middle" fill="#1a1a1a">49</text>

  <!-- leaf 3: [54 | 68 | 76] -->
  <rect x="340" y="142" width="165" height="38" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="395" y1="142" x2="395" y2="180" stroke="#2E7D43" stroke-width="1"/>
  <line x1="450" y1="142" x2="450" y2="180" stroke="#2E7D43" stroke-width="1"/>
  <text x="368" y="166" text-anchor="middle" fill="#1a1a1a">54</text>
  <text x="423" y="166" text-anchor="middle" fill="#1a1a1a">68</text>
  <text x="478" y="166" text-anchor="middle" fill="#1a1a1a">76</text>

  <!-- leaf 4: [78 | 85] -->
  <rect x="520" y="142" width="80" height="38" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="560" y1="142" x2="560" y2="180" stroke="#2E7D43" stroke-width="1"/>
  <text x="540" y="166" text-anchor="middle" fill="#1a1a1a">78</text>
  <text x="580" y="166" text-anchor="middle" fill="#1a1a1a">85</text>

  <!-- leaf chain arrows -->
  <line x1="170" y1="161" x2="185" y2="161" stroke="#C4BCB3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="325" y1="161" x2="340" y2="161" stroke="#C4BCB3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="505" y1="161" x2="520" y2="161" stroke="#C4BCB3" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#C4BCB3"/>
    </marker>
  </defs>

  <!-- caption -->
  <text x="310" y="220" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="11" fill="#555">Internal node keys divide the range. Leaves are linked in order (left to right).</text>
  <text x="310" y="237" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="11" fill="#555">To find 49: root says 31&#8804;49&#60;54, go middle leaf. Found in one hop.</text>

</svg>
