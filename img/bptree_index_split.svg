<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 330" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="13">

  <rect width="620" height="330" fill="#FAF7F2" rx="6"/>

  <!-- ── BEFORE ── -->
  <text x="18" y="24" font-family="'Manrope',sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#5C2E2A">BEFORE</text>

  <!-- grandparent (placeholder) -->
  <rect x="240" y="30" width="140" height="34" rx="4" fill="#fff" stroke="#C4BCB3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="52" text-anchor="middle" fill="#888" font-family="'Manrope',sans-serif" font-size="11">grandparent</text>

  <line x1="310" y1="64" x2="310" y2="84" stroke="#C4BCB3" stroke-width="1.5"/>

  <!-- overflowing internal node -->
  <rect x="60" y="86" width="500" height="36" rx="4" fill="#FFF0EE" stroke="#E63E23" stroke-width="2"/>
  <line x1="160" y1="86" x2="160" y2="122" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="260" y1="86" x2="260" y2="122" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="360" y1="86" x2="360" y2="122" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="460" y1="86" x2="460" y2="122" stroke="#E63E23" stroke-width="1.5"/>
  <text x="110" y="109" text-anchor="middle" fill="#3D1F1C" font-weight="700">10</text>
  <text x="210" y="109" text-anchor="middle" fill="#3D1F1C" font-weight="700">20</text>
  <text x="310" y="109" text-anchor="middle" fill="#E63E23" font-weight="700">30</text>
  <text x="410" y="109" text-anchor="middle" fill="#3D1F1C" font-weight="700">40</text>
  <text x="510" y="109" text-anchor="middle" fill="#3D1F1C" font-weight="700">50</text>
  <text x="310" y="78" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">internal (routing) node</text>

  <!-- overflow badge -->
  <rect x="238" y="126" width="144" height="18" rx="3" fill="#E63E23"/>
  <text x="310" y="139" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" font-weight="700" fill="#fff">5 keys — overflow!</text>

  <!-- ── arrow ── -->
  <line x1="310" y1="152" x2="310" y2="172" stroke="#5C2E2A" stroke-width="2" marker-end="url(#darr2)"/>

  <!-- ── AFTER ── -->
  <text x="18" y="186" font-family="'Manrope',sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#2E7D43">AFTER</text>

  <!-- grandparent with 30 pushed up -->
  <rect x="200" y="188" width="220" height="36" rx="4" fill="#EAF4EC" stroke="#2E7D43" stroke-width="2"/>
  <line x1="273" y1="188" x2="273" y2="224" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="347" y1="188" x2="347" y2="224" stroke="#2E7D43" stroke-width="1.5"/>
  <text x="237" y="211" text-anchor="middle" fill="#888" font-style="italic" font-size="11">prev</text>
  <text x="310" y="211" text-anchor="middle" fill="#2E7D43" font-weight="700">30</text>
  <text x="383" y="211" text-anchor="middle" fill="#888" font-style="italic" font-size="11">next</text>
  <text x="310" y="183" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#2E7D43" font-weight="700">30 pushed up into grandparent</text>

  <!-- connectors to child internal nodes -->
  <line x1="260" y1="224" x2="165" y2="256" stroke="#C4BCB3" stroke-width="1.5"/>
  <line x1="360" y1="224" x2="455" y2="256" stroke="#C4BCB3" stroke-width="1.5"/>

  <!-- left child internal: [10|20] -->
  <rect x="50" y="258" width="230" height="36" rx="4" fill="#fff" stroke="#5C2E2A" stroke-width="1.5"/>
  <line x1="165" y1="258" x2="165" y2="294" stroke="#5C2E2A" stroke-width="1"/>
  <text x="108" y="281" text-anchor="middle" fill="#3D1F1C" font-weight="700">10</text>
  <text x="222" y="281" text-anchor="middle" fill="#3D1F1C" font-weight="700">20</text>

  <!-- right child internal: [40|50] -->
  <rect x="340" y="258" width="230" height="36" rx="4" fill="#fff" stroke="#5C2E2A" stroke-width="1.5"/>
  <line x1="455" y1="258" x2="455" y2="294" stroke="#5C2E2A" stroke-width="1"/>
  <text x="398" y="281" text-anchor="middle" fill="#3D1F1C" font-weight="700">40</text>
  <text x="512" y="281" text-anchor="middle" fill="#3D1F1C" font-weight="700">50</text>

  <!-- note: 30 is gone -->
  <text x="310" y="318" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="11" fill="#E63E23" font-weight="600">30 does not appear in either child — it only lives in the parent now.</text>

  <defs>
    <marker id="darr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5C2E2A"/>
    </marker>
  </defs>

</svg>
