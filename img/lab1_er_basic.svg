<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="ER diagram: Artist records Song">
  <defs>
    <style>
      .er-entity { fill:#FAF7F2; stroke:#5C2E2A; stroke-width:2; }
      .er-rel    { fill:#FAF7F2; stroke:#5C2E2A; stroke-width:2; }
      .er-attr   { fill:#FFFFFF; stroke:#7A4540; stroke-width:1.5; }
      .er-line   { stroke:#5C2E2A; stroke-width:1.5; fill:none; }
      .er-key    { text-decoration: underline; }
      .er-label  { font-family: "Manrope", system-ui, sans-serif; font-size: 14px; fill:#1A1A1A; }
      .er-label--bold { font-weight:700; }
      .er-attr-label { font-family:"Manrope", system-ui, sans-serif; font-size:12px; fill:#1A1A1A; }
      .er-rel-label  { font-family:"Manrope", system-ui, sans-serif; font-size:13px; font-weight:600; fill:#1A1A1A; }
    </style>
  </defs>

  <!-- ARTIST entity -->
  <rect class="er-entity" x="40" y="150" width="140" height="60" rx="2"/>
  <text class="er-label er-label--bold" x="110" y="186" text-anchor="middle">Artist</text>

  <!-- Artist attribute: name -->
  <line class="er-line" x1="80" y1="150" x2="60" y2="80"/>
  <ellipse class="er-attr" cx="60" cy="60" rx="44" ry="20"/>
  <text class="er-attr-label" x="60" y="64" text-anchor="middle">name</text>

  <!-- Artist attribute: artist_id (key) -->
  <line class="er-line" x1="140" y1="150" x2="160" y2="80"/>
  <ellipse class="er-attr" cx="160" cy="60" rx="50" ry="20"/>
  <text class="er-attr-label er-key" x="160" y="64" text-anchor="middle">artist_id</text>

  <!-- RECORDS diamond -->
  <polygon class="er-rel" points="360,150 430,180 360,210 290,180"/>
  <text class="er-rel-label" x="360" y="184" text-anchor="middle">Records</text>

  <!-- Records attribute: recording_date -->
  <line class="er-line" x1="360" y1="210" x2="360" y2="270"/>
  <ellipse class="er-attr" cx="360" cy="290" rx="70" ry="20"/>
  <text class="er-attr-label" x="360" y="294" text-anchor="middle">recording_date</text>

  <!-- Lines between entities and diamond -->
  <line class="er-line" x1="180" y1="180" x2="290" y2="180"/>
  <line class="er-line" x1="430" y1="180" x2="540" y2="180"/>

  <!-- SONG entity -->
  <rect class="er-entity" x="540" y="150" width="140" height="60" rx="2"/>
  <text class="er-label er-label--bold" x="610" y="186" text-anchor="middle">Song</text>

  <!-- Song attribute: song_id (key) -->
  <line class="er-line" x1="580" y1="150" x2="560" y2="80"/>
  <ellipse class="er-attr" cx="560" cy="60" rx="50" ry="20"/>
  <text class="er-attr-label er-key" x="560" y="64" text-anchor="middle">song_id</text>

  <!-- Song attribute: title -->
  <line class="er-line" x1="640" y1="150" x2="660" y2="80"/>
  <ellipse class="er-attr" cx="660" cy="60" rx="44" ry="20"/>
  <text class="er-attr-label" x="660" y="64" text-anchor="middle">title</text>
</svg>
