<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="13">

  <rect width="620" height="310" fill="#FAF7F2" rx="6"/>

  <!-- ── BEFORE ── -->
  <text x="18" y="24" font-family="'Manrope',sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#5C2E2A">BEFORE</text>

  <!-- parent node (partial, shows space for new key) -->
  <rect x="200" y="34" width="220" height="36" rx="4" fill="#fff" stroke="#5C2E2A" stroke-width="2"/>
  <line x1="273" y1="34" x2="273" y2="70" stroke="#5C2E2A" stroke-width="1.5"/>
  <line x1="347" y1="34" x2="347" y2="70" stroke="#5C2E2A" stroke-width="1.5"/>
  <text x="237" y="57" text-anchor="middle" fill="#3D1F1C" font-weight="700">10</text>
  <text x="310" y="57" text-anchor="middle" fill="#888" font-style="italic" font-size="11">empty</text>
  <text x="383" y="57" text-anchor="middle" fill="#888" font-style="italic" font-size="11">empty</text>
  <text x="310" y="26" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#888">parent node</text>

  <!-- connector -->
  <line x1="310" y1="70" x2="310" y2="98" stroke="#C4BCB3" stroke-width="1.5"/>

  <!-- overflowing leaf -->
  <rect x="60" y="100" width="500" height="38" rx="4" fill="#FFF0EE" stroke="#E63E23" stroke-width="2"/>
  <line x1="160" y1="100" x2="160" y2="138" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="260" y1="100" x2="260" y2="138" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="360" y1="100" x2="360" y2="138" stroke="#E63E23" stroke-width="1.5"/>
  <line x1="460" y1="100" x2="460" y2="138" stroke="#E63E23" stroke-width="1.5"/>
  <text x="110" y="124" text-anchor="middle" fill="#3D1F1C" font-weight="700">13</text>
  <text x="210" y="124" text-anchor="middle" fill="#3D1F1C" font-weight="700">15</text>
  <text x="310" y="124" text-anchor="middle" fill="#3D1F1C" font-weight="700">16</text>
  <text x="410" y="124" text-anchor="middle" fill="#3D1F1C" font-weight="700">18</text>
  <text x="510" y="124" text-anchor="middle" fill="#3D1F1C" font-weight="700">24</text>
  <!-- overflow badge -->
  <rect x="238" y="142" width="144" height="18" rx="3" fill="#E63E23"/>
  <text x="310" y="155" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" font-weight="700" fill="#fff">5 keys — overflow!</text>

  <!-- ── arrow down ── -->
  <line x1="310" y1="168" x2="310" y2="192" stroke="#5C2E2A" stroke-width="2" marker-end="url(#darr)"/>

  <!-- ── AFTER ── -->
  <text x="18" y="204" font-family="'Manrope',sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#2E7D43">AFTER</text>

  <!-- parent with 18 copied up -->
  <rect x="200" y="210" width="220" height="36" rx="4" fill="#EAF4EC" stroke="#2E7D43" stroke-width="2"/>
  <line x1="273" y1="210" x2="273" y2="246" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="347" y1="210" x2="347" y2="246" stroke="#2E7D43" stroke-width="1.5"/>
  <text x="237" y="233" text-anchor="middle" fill="#3D1F1C" font-weight="700">10</text>
  <text x="310" y="233" text-anchor="middle" fill="#2E7D43" font-weight="700">18</text>
  <text x="383" y="233" text-anchor="middle" fill="#888" font-style="italic" font-size="11">empty</text>
  <!-- annotation -->
  <text x="310" y="204" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#2E7D43" font-weight="700">18 copied up into parent</text>

  <!-- connectors to leaves -->
  <line x1="255" y1="246" x2="175" y2="272" stroke="#C4BCB3" stroke-width="1.5"/>
  <line x1="365" y1="246" x2="445" y2="272" stroke="#C4BCB3" stroke-width="1.5"/>

  <!-- left leaf: [13|15|16] -->
  <rect x="70" y="274" width="200" height="36" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="137" y1="274" x2="137" y2="310" stroke="#2E7D43" stroke-width="1"/>
  <line x1="204" y1="274" x2="204" y2="310" stroke="#2E7D43" stroke-width="1"/>
  <text x="104" y="297" text-anchor="middle" fill="#1a1a1a">13</text>
  <text x="171" y="297" text-anchor="middle" fill="#1a1a1a">15</text>
  <text x="237" y="297" text-anchor="middle" fill="#1a1a1a">16</text>

  <!-- right leaf: [18|24] — 18 highlighted -->
  <rect x="345" y="274" width="200" height="36" rx="4" fill="#fff" stroke="#2E7D43" stroke-width="1.5"/>
  <line x1="412" y1="274" x2="412" y2="310" stroke="#2E7D43" stroke-width="1"/>
  <rect x="345" y="274" width="67" height="36" rx="4" fill="#EAF4EC"/>
  <line x1="412" y1="274" x2="412" y2="310" stroke="#2E7D43" stroke-width="1"/>
  <text x="379" y="297" text-anchor="middle" fill="#2E7D43" font-weight="700">18</text>
  <text x="446" y="297" text-anchor="middle" fill="#1a1a1a">24</text>

  <!-- note: 18 stays in leaf -->
  <text x="379" y="320" text-anchor="middle" font-family="'Manrope',sans-serif" font-size="10" fill="#2E7D43">18 stays here too</text>

  <defs>
    <marker id="darr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5C2E2A"/>
    </marker>
  </defs>

</svg>
